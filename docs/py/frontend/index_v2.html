      if (sidebar) {
        sidebar.classList.toggle('active');
      }
    }

    function showModal({ title, body, showInput = false, placeholder = '', okOnly = false, okText = '确定', cancelText = '取消' }) {
      return new Promise((resolve) => {
        const modal = document.getElementById('custom-modal');
        const titleEl = document.getElementById('modal-title');
        const bodyEl = document.getElementById('modal-body');
        const inputEl = document.getElementById('modal-input');
        const okBtn = document.getElementById('modal-ok-btn');
        const cancelBtn = document.getElementById('modal-cancel-btn');

        titleEl.textContent = title || '提示';
        bodyEl.textContent = body || '';
        inputEl.classList.toggle('hidden', !showInput);
        if (showInput) {
          inputEl.value = '';
          inputEl.placeholder = placeholder;
        }
        cancelBtn.classList.toggle('hidden', okOnly);
        okBtn.textContent = okText;
        cancelBtn.textContent = cancelText;

        const close = (res) => {
          modal.classList.remove('active');
          resolve(res);
        };

        modal.classList.add('active');
        if (showInput) setTimeout(() => inputEl.focus(), 100);

        okBtn.onclick = () => close(showInput ? inputEl.value : true);
        cancelBtn.onclick = () => close(showInput ? null : false);
        modal.onclick = (e) => { if (e.target === modal && !okOnly) close(showInput ? null : false); };
      });
    }

    function formatStructuredValue(value, unit = '') {
      if (value === null || value === undefined || value === '') return '-';
      const num = Number(value);
      if (!Number.isNaN(num)) {
        return `${Number.isInteger(num) ? num : num.toFixed(1)}${unit || ''}`;
      }
      return `${value}${unit || ''}`;
    }

    function normalizeStructuredRenderPayload(payload) {
      if (!payload || typeof payload !== 'object') return null;
      if (String(payload.type || '') === 'structured_report') return payload;
      if (String(payload.type || '') !== 'health_check_report') return null;
      const profile = payload.profile && typeof payload.profile === 'object' ? payload.profile : {};
      const summary = payload.summary && typeof payload.summary === 'object' ? payload.summary : {};
      const metrics = Array.isArray(payload.metrics) ? payload.metrics : [];
      const chartSpec = payload.chart_spec && typeof payload.chart_spec === 'object' ? payload.chart_spec : {};
      const abnormalItems = Array.isArray(payload.abnormal_items) ? payload.abnormal_items : [];
      const cards = [
        { label: '风险等级', value: summary.risk_level || '-' },
        { label: '异常项数量', value: summary.abnormal_count ?? abnormalItems.length ?? 0 },
        { label: '已识别指标', value: summary.measured_count ?? metrics.length ?? 0 },
      ];
      const profileItems = [
        profile.name ? { label: '姓名', value: profile.name } : null,
        profile.gender ? { label: '性别', value: profile.gender } : null,
        profile.age !== undefined && profile.age !== '' ? { label: '年龄', value: profile.age } : null,
      ].filter(Boolean);
      return {
        type: 'structured_report',
        title: '体检报告摘要',
        subtitle: '工作流已完成结构化解析、风险分层和健康管理建议生成，可作为通用结构化报告渲染结果。',
        profile_items: profileItems,
        cards,
        tables: metrics.length ? [{
          title: '指标明细',
          columns: [
            { key: 'label', label: '指标' },
            { key: 'display_value', label: '数值' },
            { key: 'status', label: '状态', kind: 'status' },
            { key: 'reference', label: '参考范围' },
          ],
          rows: metrics.map(item => ({
            ...item,
            display_value: formatStructuredValue(item?.value, item?.unit || ''),
          })),
        }] : [],
        charts: Array.isArray(chartSpec?.charts) ? chartSpec.charts : [],
        sections: abnormalItems.length ? [{
          title: '关键异常项',
          items: abnormalItems.slice(0, 4).map(item => ({
            title: `${item?.label || '-'} ${item?.status || ''}`,
            content: item?.reason || '建议结合线下复查继续判断。',
          })),
        }] : [],
      };
    }

    function buildStructuredCards(cards = []) {
      if (!Array.isArray(cards) || !cards.length) return '';
      return `
        <div class="health-stats">
          ${cards.map((item) => `
            <div class="health-stat-card">
              <div class="health-stat-label">${escapeHtml(String(item?.label || '-'))}</div>
              <div class="health-stat-value">${escapeHtml(String(item?.value ?? '-'))}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function buildStructuredTable(table) {
      if (!table || !Array.isArray(table.columns) || !Array.isArray(table.rows) || !table.rows.length) return '';
      return `
        ${table.title ? `<div class="health-chart-title" style="margin:0 0 10px 0;">${escapeHtml(String(table.title))}</div>` : ''}
        <table class="health-metrics-table">
          <thead>
            <tr>${table.columns.map((col) => `<th>${escapeHtml(String(col?.label || '-'))}</th>`).join('')}</tr>
          </thead>
          <tbody>
            ${table.rows.map((row) => `
              <tr>
                ${table.columns.map((col) => {
                  const raw = row?.[col.key];
                  if (col.kind === 'status') {
                    const status = String(raw || '正常');
                    const cls = status.includes('高') ? 'health-status-high' : (status.includes('低') ? 'health-status-low' : 'health-status-normal');
                    return `<td><span class="health-status-badge ${cls}">${escapeHtml(status)}</span></td>`;
                  }
                  return `<td>${escapeHtml(String(raw ?? '-'))}</td>`;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function buildStructuredDonut(chart) {
      const data = Array.isArray(chart?.data) ? chart.data.filter(item => Number(item?.value || 0) > 0) : [];
      if (!data.length) return '';
      const total = data.reduce((sum, item) => sum + Number(item.value || 0), 0) || 1;
      const colors = ['#10b981', '#ef4444', '#f59e0b', '#6366f1', '#06b6d4'];
      let current = 0;
      const segments = data.map((item, index) => {
        const start = current;
        const percent = Number(item.value || 0) / total * 100;
        current += percent;
        return `${colors[index % colors.length]} ${start.toFixed(2)}% ${current.toFixed(2)}%`;
      });
      return `
        <div class="health-chart-card">
          <div class="health-chart-title">${escapeHtml(String(chart?.title || '图表'))}</div>
          <div class="health-donut-wrap">
            <div class="health-donut" style="background: conic-gradient(${segments.join(', ')});">
              <div class="health-donut-center">
                <strong>${escapeHtml(String(total))}</strong>
                <span>总计</span>
              </div>
            </div>
            <div class="health-legend">
              ${data.map((item, index) => `
                <div class="health-legend-item">
                  <span class="health-legend-label">
                    <span class="health-legend-dot" style="background:${colors[index % colors.length]}"></span>
                    ${escapeHtml(String(item?.name || '-'))}
                  </span>
                  <span>${escapeHtml(String(item?.value || 0))}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function buildStructuredBar(chart) {
      const series = Array.isArray(chart?.series) ? chart.series.filter(item => Array.isArray(item?.data) && item.data.length) : [];
      if (!series.length) return '';
      const allValues = series.flatMap((group) => group.data.map((item) => Number(item?.value || 0)));
      const maxValue = Math.max(1, ...allValues);
      const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
      return `
        <div class="health-chart-card">
          <div class="health-chart-title">${escapeHtml(String(chart?.title || '柱状图'))}</div>
          <div class="health-bar-chart">
            ${series.map((group, groupIndex) => `
              <div class="health-bar-group">
                ${series.length > 1 ? `<div class="health-series-title">${escapeHtml(String(group?.name || `系列${groupIndex + 1}`))}</div>` : ''}
                ${group.data.map((item) => {
                  const value = Number(item?.value || 0);
                  const width = Math.max(4, Math.min(100, (value / maxValue) * 100));
                  const unit = item?.unit ? String(item.unit) : '';
                  return `
                    <div class="health-bar-row">
                      <div class="health-bar-name">${escapeHtml(String(item?.name || '-'))}</div>
                      <div class="health-bar-track">
                        <div class="health-bar-fill" style="width:${width}%;background:${colors[groupIndex % colors.length]};"></div>
                      </div>
                      <div class="health-bar-value">${escapeHtml(String(item?.value ?? 0))}${escapeHtml(unit)}</div>
                    </div>
                  `;
                }).join('')}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function buildStructuredSections(sections = []) {
      if (!Array.isArray(sections) || !sections.length) return '';
      return sections.map((section) => `
        ${section?.title ? `<div class="health-chart-title" style="margin:14px 0 8px;">${escapeHtml(String(section.title))}</div>` : ''}
        <div class="health-abnormal-list">
          ${(Array.isArray(section?.items) ? section.items : []).map((item) => `
            <div class="health-abnormal-item">
              ${item?.title ? `<strong>${escapeHtml(String(item.title))}</strong><br>` : ''}
              ${escapeHtml(String(item?.content || ''))}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function buildStructuredRenderCard(payload) {
      const report = normalizeStructuredRenderPayload(payload);
      if (!report) return '';
      const profileItems = Array.isArray(report.profile_items) ? report.profile_items : [];
      const tables = Array.isArray(report.tables) ? report.tables : [];
      const charts = Array.isArray(report.charts) ? report.charts : [];
      const sectionGroups = []
        .concat(Array.isArray(report.sections) ? report.sections : [])
        .concat(Array.isArray(report.sections_extra) ? report.sections_extra : []);
      return `
        <section class="health-report-card">
          <div class="health-report-head">
            <div class="health-report-title">${escapeHtml(String(report.title || '结构化结果'))}</div>
            ${report.subtitle ? `<div class="health-report-subtitle">${escapeHtml(String(report.subtitle))}</div>` : ''}
          </div>
          <div class="health-report-grid">
            <div>
              ${profileItems.length ? `<div class="health-profile">${profileItems.map((item) => `<span class="health-pill">${escapeHtml(String(item.label || '-'))} ${escapeHtml(String(item.value ?? '-'))}</span>`).join('')}</div>` : ''}
              ${buildStructuredCards(report.cards || [])}
              ${tables.map((table) => buildStructuredTable(table)).join('')}
            </div>
            <div>
              ${charts.map((chart) => {
                if (chart?.type === 'donut') return buildStructuredDonut(chart);
                if (chart?.type === 'bar') return buildStructuredBar(chart);
                return '';
              }).join('')}
              ${buildStructuredSections(sectionGroups)}
            </div>
          </div>
        </section>
      `;
    }

    function renderAssistantBubble(contentEl, html, renderPayload) {
      if (!contentEl) return;
      contentEl.innerHTML = `${buildStructuredRenderCard(renderPayload)}${html || ''}`;
    }


    function appendMessage(role, html, options = {}) {
      const container = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = `message-row ${role === 'user' ? 'user' : 'assistant'}`;
      if (role === 'user') {
        const imageMarkup = Array.isArray(options.images) && options.images.length
          ? `<div class="flex flex-wrap gap-2 mb-3">${options.images.map((item) => `<img src="${escapeHtml(item.data_url || '')}" alt="${escapeHtml(item.name || 'image')}" style="width:96px;height:96px;object-fit:cover;border-radius:14px;border:1px solid var(--line);background:#fff;">`).join('')}</div>`
          : '';
        row.innerHTML = `<div class="avatar">你</div><div class="bubble">${imageMarkup}${html ? `<div>${escapeHtml(html)}</div>` : ''}</div>`;
      } else {
        row.innerHTML = `<div class="avatar">${currentChatLogo ? `<img src="${currentChatLogo}" alt="企业LOGO" style="width:100%;height:100%;object-fit:contain;background:#fff;padding:3px;">` : 'AI'}</div><div class="bubble prose"><span class="ai-content">${html}</span></div>`;
      }
      container.appendChild(row);
      if (role !== 'user' && options?.renderPayload) {
        renderAssistantBubble(row.querySelector('.ai-content'), html, options.renderPayload);
      }
      container.scrollTop = container.scrollHeight;
      return row;
    }

    function createStreamingMessage() {
      const container = document.getElementById('chat-messages');
      const row = document.createElement('div');
      row.className = 'message-row assistant';
      row.innerHTML = `
        <div class="avatar">${currentChatLogo ? `<img src="${currentChatLogo}" alt="企业LOGO" style="width:100%;height:100%;object-fit:contain;background:#fff;padding:3px;">` : 'AI'}</div>
        <div class="bubble prose">
          <div class="ai-status"></div>
          <span class="ai-content"><span class="typing"><span></span><span></span><span></span></span></span>
        </div>
      `;
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return {
        statusEl: row.querySelector('.ai-status'),
        contentEl: row.querySelector('.ai-content')
      };
    }

    function normalizeAgentResponseEnvelope(rawText, fallbackRenderPayload = null) {
      const text = String(rawText || '').trim();
      const normalizedFallback = normalizeStructuredRenderPayload(fallbackRenderPayload);
      if (!text) {
        return { answerText: '', renderPayload: normalizedFallback };
      }
      try {
        const parsed = JSON.parse(text);
        if (parsed && typeof parsed === 'object') {
          const answerText = String(
            parsed.answer_text || parsed.answer || parsed.text || parsed.markdown || parsed.content || ''
          ).trim();
          const renderPayload = normalizeStructuredRenderPayload(parsed.render_payload || normalizedFallback);
          if (answerText || renderPayload) {
            return { answerText: answerText || '', renderPayload };
          }
        }
      } catch (error) {}
      return { answerText: text, renderPayload: normalizedFallback };
    }

    function isLikelyJsonEnvelopeFragment(rawText) {
      const text = String(rawText || '').trimStart();
      if (!text.startsWith('{')) return false;
      const head = text.slice(0, 240);
      return (
        head.includes('"answer_text"') ||
        head.includes('"answer"') ||
        head.includes('"render_payload"') ||
        head.includes('"type"') ||
        head === '{'
      );
    }

    function showQueueStatus(statusEl, position) {
      statusEl.innerHTML = `<div class="status-text">AI 正在排队计算中，前方 ${position || 1} 人...</div>`;
    }

    async function sendMessage() {
      if (isStreaming) return;
      if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
        renderAgentPortal();
        await showModal({ title: '请选择智能体', body: '请先选择要进入的智能体，再开始提问。', okOnly: true });
        return;
      }
      const input = document.getElementById('chat-input');
      const question = input.value.trim();
      const images = pendingChatImages.slice();
      if (!question && !images.length) return;
      if (!currentSessionId && !isPublicAgentMode) {
        const session = await createNewSession(question || (images.length ? '图片提问' : '新对话'));
        persistCurrentSession(session.session_id || '');
        await fetchSessionList();
        renderChatMessagesFromSession([]);
      }

      clearWelcomeState();

      input.value = '';
      appendMessage('user', question, { images });
      clearPendingChatImages();

      isStreaming = true;
      const btn = document.getElementById('send-btn');
      btn.disabled = true;

      const { statusEl, contentEl } = createStreamingMessage();
      let fullText = '';
      let latestRenderPayload = null;
      let envelopeBuffer = '';
      let envelopeMode = false;
      let suppressStructuredTextStreaming = false;
      const streamingEnabled = currentChatExperience.streaming !== false;
      const fallbackEnabled = currentChatExperience.fallback_enabled !== false;
      const fallbackMessage = currentChatExperience.fallback_message || '针对您这个问题，我暂时还无法进行回答，请换一个问题吧。';

      try {
        const endpoint = isPublicAgentMode ? '/api/public/chat' : '/api/chat';
        const payload = isPublicAgentMode
          ? { tenant_id: currentTenantId, agent_id: currentAgentId, question, images }
          : { password: authPassword, phone: authPhone, question, images, session_id: currentSessionId, agent_id: currentAgentId };
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!isPublicAgentMode && res.status === 403) {
          let errMsg = '账号校验失败';
          try { const err = await res.json(); errMsg = err.msg || errMsg; } catch (error) {}
          contentEl.innerHTML = `<p class="error-text">${escapeHtml(fallbackEnabled ? fallbackMessage : errMsg)}</p>`;
          statusEl.innerHTML = '';
          isStreaming = false;
          btn.disabled = false;
          return;
        }
        if (res.status === 429) {
          contentEl.innerHTML = `<p class="error-text">${escapeHtml(fallbackEnabled ? fallbackMessage : '请求过于频繁，每 10 秒仅可提问 1 次，请稍后再试。')}</p>`;
          statusEl.innerHTML = '';
          isStreaming = false;
          btn.disabled = false;
          return;
        }
        if (!res.ok) {
          let errMsg = '请求失败';
          try { const err = await res.json(); errMsg = err.msg || errMsg; } catch (error) {}
          contentEl.innerHTML = `<p class="error-text">${escapeHtml(fallbackEnabled ? fallbackMessage : errMsg)}</p>`;
          statusEl.innerHTML = '';
          isStreaming = false;
          btn.disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.status === 'queued') {
                showQueueStatus(statusEl, parsed.position || 1);
                continue;
              }
              if (parsed.session_id) {
                persistCurrentSession(parsed.session_id);
              }
              if (parsed.status === 'generating') {
                statusEl.innerHTML = '';
                continue;
              }
              if (parsed.retrieval_trace?.render_payload) {
                latestRenderPayload = normalizeStructuredRenderPayload(parsed.retrieval_trace.render_payload);
                suppressStructuredTextStreaming = !!latestRenderPayload;
                if (fullText) {
                  renderAssistantBubble(contentEl, marked.parse(fullText), latestRenderPayload);
                }
              }
              if (parsed.status === 'cache_hit') {
                statusEl.innerHTML = '<span class="cache-badge">闪电回复</span>';
                continue;
              }
              if (parsed.status === 'degrading') {
                statusEl.innerHTML = '<div class="status-text">服务繁忙，正在切换备用引擎...</div>';
                continue;
              }
              if (parsed.content) {
                const rawChunk = String(parsed.content || '');
                if (suppressStructuredTextStreaming) {
                  envelopeMode = true;
                  envelopeBuffer += rawChunk;
                  continue;
                }
                const nextEnvelopeBuffer = envelopeMode ? `${envelopeBuffer}${rawChunk}` : rawChunk;
                if (envelopeMode || isLikelyJsonEnvelopeFragment(nextEnvelopeBuffer)) {
                  envelopeMode = true;
                  envelopeBuffer = nextEnvelopeBuffer;
                  const normalizedEnvelope = normalizeAgentResponseEnvelope(envelopeBuffer, latestRenderPayload);
                  const envelopeParsed = normalizedEnvelope.answerText !== envelopeBuffer.trim() || !!normalizedEnvelope.renderPayload;
                  if (envelopeParsed) {
                    if (normalizedEnvelope.renderPayload) {
                      latestRenderPayload = normalizedEnvelope.renderPayload;
                    }
                    fullText = sanitizeAiMessage(normalizedEnvelope.answerText || '');
                    if (streamingEnabled) {
                      renderAssistantBubble(contentEl, marked.parse(fullText), latestRenderPayload);
                      document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                    }
                  }
                  continue;
                }
                const normalizedChunk = normalizeAgentResponseEnvelope(rawChunk, latestRenderPayload);
                if (normalizedChunk.renderPayload) {
                  latestRenderPayload = normalizedChunk.renderPayload;
                }
                fullText += sanitizeAiMessage(normalizedChunk.answerText || '');
                if (streamingEnabled) {
                  renderAssistantBubble(contentEl, marked.parse(fullText), latestRenderPayload);
                  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                }
              }
            } catch (error) {}
          }
        }
        if (envelopeMode && envelopeBuffer) {
          const normalizedEnvelope = normalizeAgentResponseEnvelope(envelopeBuffer, latestRenderPayload);
          if (normalizedEnvelope.renderPayload) {
            latestRenderPayload = normalizedEnvelope.renderPayload;
          }
          fullText = sanitizeAiMessage(normalizedEnvelope.answerText || fullText || '');
          renderAssistantBubble(contentEl, marked.parse(fullText), latestRenderPayload);
          document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        }
      } catch (error) {
        contentEl.innerHTML = `<p class="error-text">${escapeHtml(fallbackEnabled ? fallbackMessage : '网络错误，请检查连接后重试。')}</p>`;
        statusEl.innerHTML = '';
      }

      if (!fullText) {
        contentEl.innerHTML = `<p class="muted">${escapeHtml(fallbackEnabled ? fallbackMessage : '未收到回复')}</p>`;
        statusEl.innerHTML = '';
      } else if (!streamingEnabled) {
        renderAssistantBubble(contentEl, marked.parse(fullText), latestRenderPayload);
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
      }
      isStreaming = false;
      btn.disabled = false;
      if (!isPublicAgentMode) {
        await fetchSessionList();
      }
      input.focus();
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => document.body.classList.add('icons-ready'));
    } else {
      document.body.classList.add('icons-ready');
    }

    (async function init() {
      hydrateCurrentSessionFromStorage();
      await loadAppConfig();
      if (isPublicAgentMode) {
        availableAgents = currentAgentMeta ? [currentAgentMeta] : [];
        currentSessionId = '';
        renderAgentSwitcher();
        renderSessionList();
        renderChatMessagesFromSession([]);
        document.getElementById('chat-input')?.focus();
        return;
      }
      if (!authPassword || !authPhone) {
        window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
        return;
      }
      fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: authPassword, phone: authPhone })
      }).then(async (r) => r.json()).then(async (data) => {
        if (data.ok) {
          await loadAvailableAgents();
          await fetchSessionList();
          const currentExists = sessionList.some(item => item.session_id === currentSessionId);
          if (!currentAgentId && Array.isArray(availableAgents) && availableAgents.length > 1) {
            persistCurrentSession('');
            renderSessionList();
            renderAgentPortal();
          } else if (currentSessionId && currentExists) {
            await openSession(currentSessionId);
          } else if (sessionList.length) {
            await openSession(sessionList[0].session_id);
          } else {
            persistCurrentSession('');
            renderSessionList();
            renderChatMessagesFromSession([]);
          }
          document.getElementById('chat-input').focus();
        } else {
          localStorage.removeItem('auth_password');
          localStorage.removeItem('auth_phone');
          localStorage.removeItem('chat_current_session_id');
          authPassword = '';
          authPhone = '';
          window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
        }
      }).catch(() => {
        window.location.href = currentAgentId ? `/login?agent_id=${encodeURIComponent(currentAgentId)}` : '/login';
      });
    })();
  </script>
</body>
</html>
