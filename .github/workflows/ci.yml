name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd docs/py
          pip install -r requirements.txt
          pip install flake8 pylint

      - name: Lint with flake8
        run: |
          cd docs/py
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=18 --max-line-length=127 --statistics

      - name: Check Python syntax
        run: |
          cd docs/py
          python -m py_compile backend/main.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd docs/py
          pip install -r requirements.txt

      - name: Verify app config
        run: |
          cd docs/py
          python -c "from pathlib import Path; assert Path('data/app_config.json').exists(), 'Missing app_config.json'"

      - name: Verify backend modules
        run: |
          cd docs/py
          python -c "
          import sys
          sys.path.insert(0, '.')
          from backend import config
          from backend import model_config
          from backend import retrieval_config
          print('Core config modules loaded successfully')
          "

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation
        run: |
          test -f README.md && echo "README.md exists"
          test -f LICENSE && echo "LICENSE exists"
          test -f CHANGELOG.md && echo "CHANGELOG.md exists"
          test -f CONTRIBUTING.md && echo "CONTRIBUTING.md exists"
          test -f SECURITY.md && echo "SECURITY.md exists"

  badge:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Build status
        run: echo "Build completed successfully"
